<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persons PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="img/icons/favicon.ico">
    <!-- Add theme color for browser UI -->
    <meta name="theme-color" content="#4285f4">
    <!-- Add to home screen for Safari on iOS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Persons PWA">
</head>

<body>
    <!-- Header component will be inserted here -->
    <div id="header-container"></div>

    <!-- Main content area -->
    <main id="app-content">
        <!-- App update notification -->
        <div id="updateNotification-container" class="update-notification hidden" role="alert" aria-live="polite"></div>

        <!-- Login Form -->
        <div id="login-container" class="auth-container hidden">
            <div class="login-form">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="error-message" id="login-error"></div>
                    <button type="submit" class="btn primary">Login</button>
                </form>
            </div>
        </div>

        <!-- App Container (shown after authentication) -->
        <div id="app-container" class="app-container hidden">
            <div class="container">
                <h1>Manage Persons</h1>

                <!-- Form for adding/editing persons -->
                <div id="person-form-container">
                    <h2 id="form-title">Add New Person</h2>
                    <form id="person-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="surname">Surname</label>
                            <input type="text" id="surname" name="surname" required>
                        </div>
                        <div class="form-group">
                            <label for="job">Job</label>
                            <input type="text" id="job" name="job" required>
                        </div>
                        <input type="hidden" id="person-id">
                        <div class="button-group">
                            <button type="submit" class="btn primary">Save</button>
                            <button type="reset" class="btn secondary" id="cancel-edit">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- List of persons -->
                <div id="persons-list-container">
                    <h2>All Persons</h2>
                    <div class="search-container">
                        <input type="text" id="search-persons" placeholder="Search persons...">
                    </div>
                    <div id="persons-list" class="list-container">
                        <!-- Person entries will be dynamically added here -->
                        <div class="loader">Loading persons...</div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer component will be inserted here -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.find.min.js"></script>
    <script type="module" src="js/services/pwa-registration.js"></script>
    <script type="module" src="js/services/auth.js"></script>
    <script type="module" src="js/services/db.js"></script>
    <script type="module" src="js/services/sync.js"></script>
    <script type="module" src="js/services/updateManager.js"></script>
    <script type="module" src="js/components/login.js"></script>
    <!--
    <script src="js/services/sync-diagnostic.js"></script>
    <script src="js/services/sync-fix.js"></script>
     -->
    <script src="js/components/header.js"></script>
    <script src="js/components/updateNotification.js"></script>
    <script src="js/components/footer.js"></script>
    <!-- <script src="js/app.js"></script> -->
    <script src="js/services/personService.js"></script>
    <script src="js/components/personForm.js"></script>
    <script src="js/components/personList.js"></script>
    <script src="js/pages/persons.js"></script>
</body>

</html>
