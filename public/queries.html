<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queries - Persons PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="img/icons/favicon.ico">
  <!-- Add theme color for browser UI -->
  <meta name="theme-color" content="#4285f4">
  <!-- Add to home screen for Safari on iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Persons PWA">
</head>
<body>
  <!-- Header component will be inserted here -->
  <div id="header-container"></div>
  
  <!-- Main content area -->
  <main id="app-content">
    <div class="container">
      <h1>Person Queries</h1>
      
      <!-- Query filters -->
      <div class="query-filters">
        <h2>Filter Options</h2>
        <div class="filter-group">
          <label for="job-filter">Filter by Job:</label>
          <select id="job-filter">
            <option value="">All Jobs</option>
            <!-- Job options will be added dynamically -->
          </select>
        </div>
        <div class="filter-group">
          <label for="name-search">Search by Name:</label>
          <input type="text" id="name-search" placeholder="Enter name...">
        </div>
        <button id="apply-filters" class="btn primary">Apply Filters</button>
        <button id="reset-filters" class="btn secondary">Reset</button>
      </div>
      
      <!-- Query results -->
      <div class="query-results">
        <h2>Results</h2>
        <div id="results-container">
          <!-- Results will be added here dynamically -->
          <div class="loader">Loading results...</div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Footer component will be inserted here -->
  <div id="footer-container"></div>
  
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.find.min.js"></script>
  <script src="js/services/db.js"></script>
  <script src="js/services/auth.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/footer.js"></script>
  <script src="js/components/menu.js"></script>
  <script src="js/services/queriesService.js"></script>
  <script src="js/pages/queries.js"></script>
</body>
</html>
